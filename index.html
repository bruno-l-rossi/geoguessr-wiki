<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoScout</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--s1:#111820;--s2:#161e28;--border:#1e2d3d;
  --acc:#00d4aa;--acc2:#ff6b35;--acc3:#4fc3f7;
  --text:#e8f0fe;--muted:#5a7a8a;--dim:#2a4a5a;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,170,.012) 2px,rgba(0,212,170,.012) 4px);pointer-events:none;z-index:1000}

/* LAYOUT */
#app{max-width:600px;margin:0 auto;padding:1rem 1rem 4rem}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 1.5rem}
.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;letter-spacing:-.3px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logo span{color:var(--acc)}
.reset-btn{font-size:12px;color:var(--muted);background:none;border:.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:'Syne',sans-serif}
.reset-btn:hover{border-color:var(--acc);color:var(--acc)}

/* PREDICTION CARD */
.pred-card{background:var(--s1);border:.5px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.pred-label{font-size:11px;color:var(--dim);letter-spacing:.06em;margin-bottom:6px;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.pred-name{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:12px;line-height:1}
.pred-name.empty{font-size:15px;color:var(--muted);font-weight:400}
.conf-row{display:flex;align-items:center;gap:10px}
.conf-bg{flex:1;height:3px;background:var(--s2);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc3));border-radius:2px;transition:width .5s ease}
.conf-pct{font-size:13px;font-weight:500;color:var(--acc);min-width:36px;text-align:right;font-family:'JetBrains Mono',monospace}

/* ALIVE */
.alive-wrap{margin-top:10px;padding-top:10px;border-top:.5px solid var(--border)}
.alive-label{font-size:11px;color:var(--dim);margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.alive-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11px;color:var(--muted);background:var(--s2);border-radius:99px;padding:3px 9px;border:.5px solid var(--border)}
.chip.top{border-color:rgba(0,212,170,.3);color:var(--acc)}
.show-more-btn{font-size:11px;color:var(--acc);cursor:pointer;background:none;border:none;font-family:'Syne',sans-serif;padding:4px 0 0;display:block}

/* PHASE BADGE */
.phase-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:1rem}
.phase-dot{width:6px;height:6px;border-radius:50%;background:var(--acc3)}

/* QUESTION CARD */
.q-card{background:var(--s1);border:.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:.75rem}
.q-head{padding:1rem 1.25rem .75rem}
.q-num{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:5px}
.q-text{font-size:16px;font-weight:500;line-height:1.45;color:var(--text)}
.q-opts{padding:0 .75rem .75rem;display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border:.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;color:var(--text);transition:border-color .15s;width:100%;text-align:left;font-family:'Syne',sans-serif}
.opt:hover{border-color:var(--acc)}
.opt.skip{color:var(--muted)}
.opt-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.opt-count{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-left:auto;flex-shrink:0}

/* DONE */
.done-wrap{text-align:center;padding:2rem 1rem}
.done-sub{font-size:12px;color:var(--muted);margin-bottom:8px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.done-country{font-size:32px;font-weight:800;letter-spacing:-1.5px;margin-bottom:6px}
.done-conf{font-size:14px;color:var(--acc);margin-bottom:1.5rem}
.done-btn{padding:12px 28px;background:linear-gradient(135deg,var(--acc),#00b894);color:#000;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

/* HISTORY */
.hist-wrap{display:flex;flex-direction:column;gap:5px;margin-top:.5rem}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--s2);border-radius:8px;border:.5px solid var(--border)}
.hist-q{font-size:11px;color:var(--muted);flex:1;margin-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-a{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap}
.hist-undo{font-size:11px;color:var(--dim);cursor:pointer;background:none;border:none;padding:0 0 0 8px;flex-shrink:0}
.hist-undo:hover{color:var(--acc)}

/* COMBO ALERT */
.combo-alert{background:rgba(0,212,170,.08);border:.5px solid rgba(0,212,170,.3);border-radius:10px;padding:10px 14px;margin-bottom:.75rem;font-size:13px;line-height:1.5}
.combo-alert strong{color:var(--acc)}

@media(max-width:480px){
  .pred-name{font-size:22px}
  .q-text{font-size:15px}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo"><div class="logo-dot"></div>Geo<span>Scout</span></div>
    <button class="reset-btn" onclick="reset()">↺ Nova rodada</button>
  </div>

  <div class="pred-card">
    <div class="pred-label">previsão atual</div>
    <div class="pred-name empty" id="pred-name">Responda a primeira pergunta...</div>
    <div class="conf-row">
      <div class="conf-bg"><div class="conf-fill" id="conf-fill" style="width:0%"></div></div>
      <div class="conf-pct" id="conf-pct">—</div>
    </div>
    <div class="alive-wrap" id="alive-wrap" style="display:none">
      <div class="alive-label" id="alive-label"></div>
      <div class="alive-chips" id="alive-chips"></div>
      <button class="show-more-btn" id="show-more-btn" onclick="toggleMore()" style="display:none"></button>
    </div>
  </div>

  <div id="combo-area"></div>
  <div id="q-area"></div>
  <div id="hist-area"></div>
</div>

      polish:['ł'],
      albanian:['ë','ç'],
      romanian:['ț','ș'],
      french_acute:['ï','ÿ']
    };
    const targets = diacMap[value] || [value];
    return targets.some(d=>diac.includes(d)) ? w : -w*0.3;
  }
  // q_cyrillic_variant
  if (qid==='q_cyrillic_variant') {
    const s = country.scripts || [];
    const slug = country.slug;
    if (!s.includes('cyrillic')) return -w*0.8;
    const cMap = {
      russian:['russia'],
      serbian:['serbia'],
      bulgarian:['bulgaria','north-macedonia'],
      ukrainian:['ukraine'],
      kazakh:['kazakhstan','kyrgyzstan'],
      mongolian:['mongolia']
    };
    return (cMap[value]||[]).includes(slug) ? w : -w*0.4;
  }
  // q_asian_script
  if (qid==='q_asian_script') {
    const scriptMap = {
      kanji_jp:['kanji'],
      hangul_kr:['hangul'],
      thai_th:['thai'],
      khmer_kh:['khmer'],
      lao_la:['lao'],
      devanagari_in:['devanagari'],
      bengali_bd:['bengali'],
      sinhala_lk:['sinhala'],
      chinese_cn:['chinese_simplified']
    };
    const targets = scriptMap[value] || [];
    const s = country.scripts || [];
    return targets.some(x=>s.includes(x)) ? w : (s.some(x=>['kanji','hangul','thai','khmer','lao','devanagari','bengali','sinhala','chinese_simplified'].includes(x)) ? -w*0.5 : -w*0.1);
  }
  // q_google_car_type
  if (qid==='q_google_car_type') {
    return country.google_car_type===value ? w*0.8 : (value!=='car' ? -w*0.3 : -w*0.05);
  }
  // q_google_car_color
  if (qid==='q_google_car_color') {
    return country.google_car_color===value ? w*0.7 : (value!=='white' ? -w*0.2 : -w*0.05);
  }
  // q_vegetation_exclusive
  if (qid==='q_vegetation_exclusive') {
    const ve = country.vegetation_exclusive || [];
    return ve.includes(value) ? w : (ve.length>0 ? -w*0.2 : -w*0.05);
  }
  // q_is_island
  if (qid==='q_is_island') {
    const is = value==='yes';
    return country.is_island===is ? w*0.6 : -w*0.4;
  }
  // q_is_microstate
  if (qid==='q_is_microstate') {
    const is = value==='yes';
    return country.is_microstate===is ? w*0.7 : -w*0.5;
  }
  // q_is_spillover
  if (qid==='q_is_spillover') {
    const is = value==='yes';
    return country.is_spillover===is ? w*0.7 : -w*0.3;
  }
  // q_fuel_brand
  if (qid==='q_fuel_brand') {
    const fb = country.fuel_brands_exclusive || [];
    const brandMap = {
      pemex:['Pemex'],ypf:['YPF'],petrobras:['Petrobras'],
      eneos:['ENEOS'],adnoc:['ADNOC'],petrol_si:['Petrol'],
      shell_generic:[],bp_generic:[]
    };
    const targets = brandMap[value] || [value];
    return targets.some(b=>fb.includes(b)) ? w : -w*0.1;
  }
  // q_plate_color
  if (qid==='q_plate_color') {
    // yellow plates: colombia, uk rear, netherlands rear, bermuda
    const yellowSlugs = ['colombia','united-kingdom','netherlands','bermuda','australia'];
    const blackSlugs = ['germany','austria','czechia'];
    if (value==='yellow') return yellowSlugs.includes(country.slug) ? w : -w*0.1;
    if (value==='black_dark') return blackSlugs.includes(country.slug) ? w : -w*0.1;
    return 0;
  }
  // q_architecture
  if (qid==='q_architecture') {
    // soft scoring based on continent + known associations
    const contMap = {
      ultra_modern:['middle_east','asia_east'],
      adobe_mud:['africa_sub','africa_north','central_america'],
      colored_wood:['europe_north','caribbean'],
      european_colonial:['europe_west','europe_central','south_america']
    };
    const targets = contMap[value] || [];
    return targets.includes(country.continent) ? w*0.4 : -w*0.1;
  }
  return 0;
}

function checkCombos() {
  const triggered = [];
  for (const combo of COMBOS) {
    if (triggeredCombos.has(combo.id)) continue;
    const conds = combo.conditions;
    let match = true;
    for (const [k,v] of Object.entries(conds)) {
      const ans = answers.find(a => {
        if (k==='driving_side') return a.qid==='q_driving';
        if (k==='road_line_outside') return a.qid==='q_line_out';
        if (k==='stop_sign') return a.qid==='q_stop';
        if (k==='road_line_exclusive') return a.qid==='q_road_line_exclusive';
        if (k==='chevron') return a.qid==='q_chevron';
        if (k==='camera_special') return a.qid==='q_camera_blur_base'||a.qid==='q_camera_blur';
        if (k==='scripts_contains') return a.qid==='q_script'||a.qid==='q_asian_script';
        if (k==='google_car_special') return a.qid==='q_exclusive';
        if (k==='continent') return false;
        return false;
      });
      if (!ans) { match=false; break; }
      if (k==='scripts_contains') {
        const scriptAns = ans.value;
        if (v==='hangul' && scriptAns!=='asian') { match=false; break; }
      } else if (ans.value !== v) { match=false; break; }
    }
    if (match) {
      triggered.push(combo);
      triggeredCombos.add(combo.id);
      // Boost matching countries
      for (const slug of combo.countries) {
        if (scores[slug]!==undefined) scores[slug] += 60;
      }
    }
  }
  return triggered;
}

function applyAnswer(qid, value) {
  COUNTRIES.forEach(c => {
    scores[c.slug] = (scores[c.slug]||0) + matchScore(c, qid, value);
  });
}

function getSorted() {
  return [...COUNTRIES].sort((a,b)=>(scores[b.slug]||0)-(scores[a.slug]||0));
}

function getConfidence(sorted) {
  if (!answers.length) return 0;
  const top = scores[sorted[0].slug]||0;
  const sec = sorted.length>1 ? (scores[sorted[1].slug]||0) : 0;
  const gap = Math.max(0, top-sec);
  const base = Math.min(97, 8 + answers.length*6 + gap*0.25);
  const boost = sorted[0].confidence_score ? sorted[0].confidence_score*0.5 : 0;
  return Math.round(Math.min(97, base + boost*0.3));
}

function getAlive(sorted) {
  if (!answers.length) return sorted;
  const top = scores[sorted[0].slug]||0;
  return sorted.filter(c=>(scores[c.slug]||0) >= top-70);
}

function updatePrediction() {
  const sorted = getSorted();
  const conf = getConfidence(sorted);
  const alive = getAlive(sorted);
  const predName = document.getElementById('pred-name');
  const confFill = document.getElementById('conf-fill');
  const confPct = document.getElementById('conf-pct');
  const aliveWrap = document.getElementById('alive-wrap');
  const aliveLabel = document.getElementById('alive-label');
  const aliveChips = document.getElementById('alive-chips');
  const smBtn = document.getElementById('show-more-btn');

  if (!answers.length) {
    predName.textContent='Responda a primeira pergunta...';
    predName.className='pred-name empty';
    confFill.style.width='0%';
    confPct.textContent='—';
    aliveWrap.style.display='none';
    return;
  }

  predName.textContent=sorted[0].name;
  predName.className='pred-name';
  confFill.style.width=conf+'%';
  confPct.textContent=conf+'%';
  aliveWrap.style.display='block';
  aliveLabel.textContent=`${alive.length} país${alive.length!==1?'es':''} candidato${alive.length!==1?'s':''}`;

  const toShow = showMore ? alive : alive.slice(0,12);
  aliveChips.innerHTML = toShow.map((c,i)=>
    `<div class="chip${i===0?' top':''}">${c.name}</div>`
  ).join('');

  if (alive.length>12) {
    smBtn.style.display='block';
    smBtn.textContent=showMore?'− mostrar menos':`+ ${alive.length-12} mais`;
  } else {
    smBtn.style.display='none';
  }
}

function renderComboAlert(combos) {
  const area = document.getElementById('combo-area');
  if (!combos.length) return;
  area.innerHTML = combos.map(c=>
    `<div class="combo-alert">
      <strong>🎯 ${c.result}</strong> — ${c.note} (${c.confidence}% de confiança)
    </div>`
  ).join('');
  setTimeout(()=>{ area.innerHTML=''; }, 6000);
}

function renderQuestion() {
  const area = document.getElementById('q-area');
  const histArea = document.getElementById('hist-area');

  if (qIndex >= ALL_QUESTIONS.length) {
    const sorted = getSorted();
    const conf = getConfidence(sorted);
    area.innerHTML=`<div class="q-card"><div class="done-wrap">
      <div class="done-sub">melhor estimativa</div>
      <div class="done-country">${sorted[0].name}</div>
      <div class="done-conf">${conf}% de confiança · ${answers.length} perguntas respondidas</div>
      <button class="done-btn" onclick="reset()">↺ Nova rodada</button>
    </div></div>`;
    histArea.innerHTML='';
    return;
  }

  const q = ALL_QUESTIONS[qIndex];
  const isGeneral = qIndex < QUESTIONS_BASE.length;
  const phaseLabel = isGeneral
    ? `<div class="phase-badge"><div class="phase-dot"></div>fase geral · pergunta ${qIndex+1} de ${ALL_QUESTIONS.length}</div>`
    : `<div class="phase-badge" style="--ph:var(--acc3)"><div class="phase-dot" style="background:var(--acc3)"></div>fase específica · pergunta ${qIndex+1} de ${ALL_QUESTIONS.length}</div>`;

  area.innerHTML=`
    ${phaseLabel}
    <div class="q-card">
      <div class="q-head">
        <div class="q-num">pergunta ${qIndex+1}</div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="q-opts">
        ${q.options.map((o,i)=>`
          <button class="opt${o.skip?' skip':''}" onclick="selectOpt(${i})">
            <span class="opt-icon">${o.icon}</span>
            <span>${o.label}</span>
            ${o.countries_count!=null?`<span class="opt-count">${o.countries_count} países</span>`:''}
          </button>
        `).join('')}
      </div>
    </div>`;

  if (answers.length) {
    histArea.innerHTML=`<div class="hist-wrap">
      ${[...answers].reverse().map((a,ri)=>{
        const qi=answers.length-1-ri;
        const qq=ALL_QUESTIONS[qi];
        return `<div class="hist-item">
          <div class="hist-q">${qq.text.substring(0,55)}...</div>
          <div class="hist-a">${a.label}</div>
          <button class="hist-undo" onclick="undoTo(${qi})" title="Desfazer">↩</button>
        </div>`;
      }).join('')}
    </div>`;
  } else {
    histArea.innerHTML='';
  }
}

function selectOpt(i) {
  const q = ALL_QUESTIONS[qIndex];
  const opt = q.options[i];
  answers.push({qid:q.id, value:opt.value, label:opt.label});
  applyAnswer(q.id, opt.value);
  const newCombos = checkCombos();
  qIndex++;
  updatePrediction();
  renderComboAlert(newCombos);
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function undoTo(qi) {
  answers = answers.slice(0, qi);
  scores = {};
  triggeredCombos = new Set();
  answers.forEach(a=>applyAnswer(a.qid, a.value));
  qIndex = qi;
  showMore = false;
  updatePrediction();
  renderQuestion();
}

function toggleMore() {
  showMore = !showMore;
  updatePrediction();
}

function reset() {
  scores={};
  answers=[];
  qIndex=0;
  showMore=false;
  triggeredCombos=new Set();
  document.getElementById('combo-area').innerHTML='';
  updatePrediction();
  renderQuestion();
}

reset();
</script>
